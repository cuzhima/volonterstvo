<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наставник Сочи — волонтёрство в образовании</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Стили */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(135deg, #e6f0fa 0%, #cfe3f5 100%);
            color: #1e2f4e;
            line-height: 1.5;
            min-height: 100vh;
        }
        .app-header {
            background: linear-gradient(135deg, #0b2b44, #1b4a6b);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 20px rgba(0,20,40,0.2);
        }
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #ffd89a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo span { font-size: 0.9rem; opacity: 0.9; }
        .nav {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .nav a, .nav button {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 0;
            border-bottom: 2px solid transparent;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .nav a:hover, .nav a.active, .nav button:hover {
            border-bottom-color: #ffb347;
        }
        .avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffb347;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 32px;
            padding: 1.8rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            margin-bottom: 2rem;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }
        .filters-panel {
            flex: 1 1 280px;
            background: rgba(255,255,255,0.9);
            border-radius: 28px;
            padding: 1.5rem;
            height: fit-content;
        }
        .requests-panel {
            flex: 3 1 500px;
        }
        .filter-group {
            margin-bottom: 1.8rem;
        }
        .filter-group h3 {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            color: #0f3b5e;
            border-left: 4px solid #ffb347;
            padding-left: 0.8rem;
        }
        .filter-group label {
            display: block;
            margin: 0.5rem 0;
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 1rem;
        }
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px,1fr));
            gap: 0.3rem;
        }
        .btn {
            background: linear-gradient(135deg, #1e4a6d, #0f3b5e);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline {
            background: white;
            color: #1e4a6d;
            border: 2px solid #1e4a6d;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .request-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
            gap: 1.5rem;
        }
        .request-card {
            background: white;
            border-radius: 24px;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(30,74,109,0.1);
            cursor: pointer;
            display: flex;
            gap: 1rem;
            position: relative;
        }
        .share-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #1e4a6d;
        }
        .avatar-medium {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1e4a6d;
        }
        .request-content {
            flex: 1;
        }
        .request-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #0b2b44;
        }
        .request-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #2c5777;
            margin: 0.5rem 0;
        }
        .badge {
            background: #e1f0fa;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .contact-chip {
            background: #f5f9ff;
            border: 1px dashed #1e4a6d;
            border-radius: 40px;
            padding: 0.4rem 1rem;
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        #map {
            height: 350px;
            width: 100%;
            border-radius: 24px;
            margin-top: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.4rem;
        }
        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.3rem;
        }
        .form-control {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 1px solid #bcd3e6;
            border-radius: 40px;
            font-size: 1rem;
        }
        textarea.form-control {
            border-radius: 24px;
            resize: vertical;
        }
        .radio-group {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            color: #4b6a88;
            background: rgba(255,255,255,0.6);
            border-radius: 32px 32px 0 0;
            margin-top: 2rem;
        }
        .hidden {
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e4a6d;
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            z-index: 1000;
        }
        .profile-header {
            display: flex;
            gap: 2rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .avatar-large {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffb347;
        }
        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        .admin-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .calendar-item {
            background: #f0f7fc;
            border-radius: 20px;
            padding: 1rem;
            border-left: 5px solid #ffb347;
        }
        .chat-container {
            border: 1px solid #bcd3e6;
            border-radius: 24px;
            padding: 1rem;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .chat-message {
            margin: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .chat-message.sent {
            background: #1e4a6d;
            color: white;
            align-self: flex-end;
        }
        .chat-message.received {
            background: #e9f0f5;
            color: #1e2f4e;
            align-self: flex-start;
        }
        .review-stars {
            color: #ffb347;
            cursor: pointer;
        }
        @media (max-width: 700px) {
            .app-header {
                flex-direction: column;
                text-align: center;
            }
            .nav {
                justify-content: center;
            }
            .profile-header {
                justify-content: center;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <h1>🌱 Наставник Сочи</h1>
            <span>волонтёрская помощь учителям</span>
        </div>
        <div class="nav" id="mainNav"></div>
    </header>

    <div id="pageContent" class="container"></div>

    <div class="footer">
        <p>🌊 Проект на конкурс «Первые шаги в цифровое будущее» — Сочи 2026</p>
    </div>

    <div id="toastMessage" class="toast hidden"></div>

    <script>
        // ========== КОНФИГУРАЦИЯ API ==========
        const API_BASE = 'https://volonterstvo.cuzhima.workers.dev'; // URL сервера

        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        async function apiRequest(endpoint, options = {}) {
            const response = await fetch(`${API_BASE}/${endpoint}`, {
                ...options,
                headers: { 'Content-Type': 'application/json', ...options.headers }
            });
            if (!response.ok) {
                const error = await response.text();
                throw new Error(error);
            }
            return response.json();
        }

        async function loadDB() {
            return await apiRequest('data');
        }

        async function saveDB(db) {
            return await apiRequest('data', {
                method: 'POST',
                body: JSON.stringify(db)
            });
        }

        async function sendEmail(emailData) {
            return await apiRequest('send-email', {
                method: 'POST',
                body: JSON.stringify(emailData)
            });
        }

        // ========== ХЭШИРОВАНИЕ ПАРОЛЯ (на клиенте) ==========
        async function hashPassword(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveBits']);
            const hashBuffer = await crypto.subtle.deriveBits(
                { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
                keyMaterial,
                256
            );
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function verifyPassword(password, salt, hash) {
            const newHash = await hashPassword(password, salt);
            return newHash === hash;
        }

        function generateSalt() {
            return crypto.getRandomValues(new Uint8Array(16)).join('');
        }

        // ========== УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЕМ ==========
        let currentUser = null;

        function setCurrentUser(user) {
            currentUser = user;
            if (user) {
                localStorage.setItem('currentUserId', user.id);
            } else {
                localStorage.removeItem('currentUserId');
            }
            updateNav();
        }

        async function loadCurrentUser() {
            const userId = localStorage.getItem('currentUserId');
            if (!userId) return null;
            const db = await loadDB();
            const user = db.users.find(u => u.id === userId);
            if (user) {
                currentUser = user;
            } else {
                localStorage.removeItem('currentUserId');
            }
            updateNav();
            return currentUser;
        }

        async function ensureAdminExists() {
            const db = await loadDB();
            if (!db.users.some(u => u.role === 'admin')) {
                const salt = generateSalt();
                const adminHash = await hashPassword('admin123', salt);
                db.users.push({
                    id: 'admin_' + Date.now(),
                    username: 'admin',
                    passwordSalt: salt,
                    passwordHash: adminHash,
                    name: 'Администратор',
                    role: 'admin',
                    approved: true,
                    email: '',
                    contact: '',
                    bio: '',
                    avatar: null
                });
                await saveDB(db);
                console.log('Администратор создан (логин: admin, пароль: admin123)');
            }
        }

        // ========== НАВИГАЦИЯ ==========
        function updateNav() {
            const nav = document.getElementById('mainNav');
            if (currentUser) {
                let adminLink = '';
                let chatsLink = '';
                if (currentUser.role === 'admin') adminLink = '<a href="#" data-page="admin">⚙️ Админка</a>';
                if (currentUser.role === 'student') chatsLink = '<a href="#" data-page="chats">💬 Чаты</a>';
                if (currentUser.role === 'teacher') chatsLink = '<a href="#" data-page="chats">💬 Чаты</a>';
                nav.innerHTML = `
                    <a href="#" data-page="home">Главная</a>
                    ${currentUser.role === 'teacher' && currentUser.approved ? '<a href="#" data-page="create">➕ Создать заявку</a>' : ''}
                    ${adminLink}
                    ${chatsLink}
                    <a href="#" data-page="profile">👤 ${currentUser.name}</a>
                    <button data-page="logout">Выйти</button>
                `;
            } else {
                nav.innerHTML = `
                    <a href="#" data-page="home">Главная</a>
                    <a href="#" data-page="login">Вход / Регистрация</a>
                    <a href="#" data-page="about">О проекте</a>
                `;
            }
            document.querySelectorAll('.nav a, .nav button').forEach(el => {
                el.addEventListener('click', (e) => {
                    e.preventDefault();
                    const page = el.dataset.page;
                    if (page === 'logout') {
                        setCurrentUser(null);
                        navigate('home');
                    } else {
                        navigate(page);
                    }
                });
            });
        }

        // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
        let map = null;
        let markersLayer = null;
        let currentRequests = [];
        let currentUsers = [];
        const districts = ['Центральный', 'Адлерский', 'Хостинский', 'Лазаревский'];
        const helpTypes = [
            { value: 'substitute', label: 'Замещение учителя' },
            { value: 'assist', label: 'Помощь учителю' },
            { value: 'event', label: 'Помощь в мероприятии' }
        ];
        const rewards = ['Еда', 'Ничего', 'Другое'];

        let filters = { search: '', district: '', dateFrom: '', dateTo: '', reward: [], helpType: [] };

        function showToast(text) {
            const toast = document.getElementById('toastMessage');
            toast.innerText = text;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        // ========== ОТРИСОВКА ГЛАВНОЙ ==========
        async function renderHome() {
            const db = await loadDB();
            currentRequests = db.requests || [];
            currentUsers = db.users || [];
            const container = document.getElementById('pageContent');
            container.innerHTML = `
                <div class="flex-row">
                    <div class="filters-panel">
                        <h2 style="margin-bottom:1rem;">🔍 Фильтры</h2>
                        <div class="filter-group">
                            <label>🔎 Поиск</label>
                            <input type="text" id="filterSearch" placeholder="Введите слово..." value="${filters.search}">
                        </div>
                        <div class="filter-group">
                            <label>📍 Район</label>
                            <select id="filterDistrict">
                                <option value="">Все районы</option>
                                ${districts.map(d => `<option value="${d}" ${filters.district===d?'selected':''}>${d}</option>`).join('')}
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>📅 Дата с</label>
                            <input type="date" id="filterDateFrom" value="${filters.dateFrom}">
                            <label>📅 по</label>
                            <input type="date" id="filterDateTo" value="${filters.dateTo}">
                        </div>
                        <div class="filter-group">
                            <h3>🍎 Поощрение</h3>
                            <div class="checkbox-grid">
                                ${rewards.map(r => `<label><input type="checkbox" value="${r}" class="filterReward" ${filters.reward.includes(r)?'checked':''}> ${r}</label>`).join('')}
                            </div>
                        </div>
                        <div class="filter-group">
                            <h3>👥 Вид помощи</h3>
                            <div class="checkbox-grid">
                                ${helpTypes.map(t => `<label><input type="checkbox" value="${t.value}" class="filterHelpType" ${filters.helpType.includes(t.value)?'checked':''}> ${t.label}</label>`).join('')}
                            </div>
                        </div>
                        <button class="btn" id="applyFiltersBtn">Применить</button>
                        <button class="btn-outline btn" id="resetFiltersBtn">Сброс</button>
                    </div>
                    <div class="requests-panel">
                        <h2>📋 Заявки (<span id="requestsCount">${currentRequests.length}</span>)</h2>
                        <div id="map"></div>
                        <div id="requestsList" class="request-grid" style="margin-top:2rem;"></div>
                    </div>
                </div>
            `;
            initMap();
            attachFilterEvents();
            applyFiltersToRequests();
        }

        function initMap() {
            if (!map) {
                map = L.map('map').setView([43.6, 39.73], 11);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
                markersLayer = L.layerGroup().addTo(map);
            } else {
                map.invalidateSize();
            }
        }

        function attachFilterEvents() {
            document.getElementById('applyFiltersBtn').addEventListener('click', applyFiltersToRequests);
            document.getElementById('resetFiltersBtn').addEventListener('click', resetFilters);
            document.querySelectorAll('.filterReward, .filterHelpType').forEach(cb => cb.addEventListener('change', updateFiltersFromInputs));
            document.getElementById('filterSearch').addEventListener('input', updateFiltersFromInputs);
            document.getElementById('filterDistrict').addEventListener('change', updateFiltersFromInputs);
            document.getElementById('filterDateFrom').addEventListener('change', updateFiltersFromInputs);
            document.getElementById('filterDateTo').addEventListener('change', updateFiltersFromInputs);
        }

        function updateFiltersFromInputs() {
            filters.search = document.getElementById('filterSearch').value;
            filters.district = document.getElementById('filterDistrict').value;
            filters.dateFrom = document.getElementById('filterDateFrom').value;
            filters.dateTo = document.getElementById('filterDateTo').value;
            filters.reward = Array.from(document.querySelectorAll('.filterReward:checked')).map(cb => cb.value);
            filters.helpType = Array.from(document.querySelectorAll('.filterHelpType:checked')).map(cb => cb.value);
        }

        function applyFiltersToRequests() {
            updateFiltersFromInputs();
            const filtered = currentRequests.filter(req => {
                if (filters.search && !req.title.toLowerCase().includes(filters.search.toLowerCase()) && !req.description.toLowerCase().includes(filters.search.toLowerCase())) return false;
                if (filters.district && req.district !== filters.district) return false;
                if (filters.dateFrom && req.dateTime < filters.dateFrom) return false;
                if (filters.dateTo && req.dateTime > filters.dateTo) return false;
                if (filters.reward.length && !filters.reward.includes(req.reward)) return false;
                if (filters.helpType.length && !filters.helpType.includes(req.helpType)) return false;
                return true;
            });
            renderRequestsList(filtered);
            updateMapMarkers(filtered);
            document.getElementById('requestsCount').innerText = filtered.length;
        }

        function resetFilters() {
            filters = { search: '', district: '', dateFrom: '', dateTo: '', reward: [], helpType: [] };
            renderHome();
        }

        function renderRequestsList(requests) {
            const listDiv = document.getElementById('requestsList');
            if (requests.length === 0) {
                listDiv.innerHTML = '<p style="grid-column:1/-1; text-align:center;">😕 Нет заявок по фильтрам</p>';
                return;
            }
            listDiv.innerHTML = requests.map(req => {
                const teacher = currentUsers.find(u => u.id === req.userId) || { name: req.teacherName, avatar: null, contact: req.teacherContact };
                const slotsLeft = req.slots - (req.booked ? req.booked.length : 0);
                return `
                <div class="request-card" data-id="${req.id}">
                    <button class="share-btn" data-id="${req.id}" title="Поделиться"><i class="fas fa-share-alt"></i></button>
                    <img src="${teacher.avatar || 'https://via.placeholder.com/60?text=+'}" class="avatar-medium" alt="avatar">
                    <div class="request-content">
                        <div class="request-title">${req.title}</div>
                        <div class="request-meta">
                            <span class="badge">${req.district}</span>
                            <span class="badge">${new Date(req.dateTime).toLocaleDateString('ru-RU')}</span>
                            <span class="badge">${helpTypes.find(t => t.value === req.helpType)?.label || req.helpType}</span>
                            <span class="badge">🎁 ${req.reward}</span>
                            <span class="badge">👥 Свободно: ${slotsLeft}/${req.slots}</span>
                        </div>
                        <p>${req.description.substring(0,80)}…</p>
                        <div class="contact-chip">👤 ${teacher.name} · ☎️ ${teacher.contact}</div>
                    </div>
                </div>
            `}).join('');
            document.querySelectorAll('.request-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.closest('.share-btn')) return;
                    const id = card.dataset.id;
                    const req = requests.find(r => r.id == id);
                    showRequestDetails(req);
                });
                const shareBtn = card.querySelector('.share-btn');
                shareBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = shareBtn.dataset.id;
                    const url = `${window.location.origin}${window.location.pathname}?request=${id}`;
                    navigator.clipboard.writeText(url);
                    showToast('Ссылка скопирована!');
                });
            });
        }

        async function showRequestDetails(req) {
            const db = await loadDB();
            const teacher = db.users.find(u => u.id === req.userId) || { name: req.teacherName, contact: req.teacherContact, bio: '', email: '' };
            const isVolunteer = currentUser && currentUser.role === 'student';
            const hasBooked = currentUser && req.booked && req.booked.some(b => b.userId === currentUser.id);
            const slotsLeft = req.slots - (req.booked ? req.booked.length : 0);
            const canBook = isVolunteer && slotsLeft > 0 && !hasBooked && req.status !== 'completed';
            const canCancel = isVolunteer && hasBooked && req.status !== 'completed';
            const canComplete = currentUser && currentUser.id === req.userId && req.status === 'active';
            const canReview = currentUser && currentUser.role === 'student' && hasBooked && req.status === 'completed' && !db.reviews.some(r => r.requestId === req.id && r.userId === currentUser.id);

            const reviews = db.reviews.filter(r => r.requestId === req.id);
            const avgRating = reviews.length ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1) : 'нет';

            const content = `
                <div class="card" style="max-width:800px; margin:0 auto;">
                    <h2>${req.title}</h2>
                    <p><strong>Учитель:</strong> ${teacher.name} (${teacher.contact})</p>

        async function bookSlot(requestId) {
            const db = await loadDB();
            const req = db.requests.find(r => r.id === requestId);
            if (!req || req.status !== 'active') { showToast('Заявка недоступна'); return; }
            const slotsLeft = req.slots - (req.booked ? req.booked.length : 0);
            if (slotsLeft <= 0) { showToast('Нет свободных мест'); return; }
            if (!req.booked) req.booked = [];
            req.booked.push({ userId: currentUser.id, bookedAt: new Date().toISOString() });
            await saveDB(db);
            showToast('Слот забронирован!');
            const teacher = db.users.find(u => u.id === req.userId);
            if (teacher && teacher.email) {
                await sendEmail({
                    to: teacher.email,
                    subject: 'Новое бронирование',
                    message: `Ученик ${currentUser.name} забронировал слот на ваше мероприятие "${req.title}".`
                });
            }
        }

        async function cancelBooking(requestId) {
            const db = await loadDB();
            const req = db.requests.find(r => r.id === requestId);
            if (req && req.booked) {
                req.booked = req.booked.filter(b => b.userId !== currentUser.id);
                await saveDB(db);
                showToast('Бронь отменена');
                const teacher = db.users.find(u => u.id === req.userId);
                if (teacher && teacher.email) {
                    await sendEmail({
                        to: teacher.email,
                        subject: 'Отмена бронирования',
                        message: `Ученик ${currentUser.name} отменил бронь на "${req.title}".`
                    });
                }
            }
        }

        async function completeRequest(requestId) {
            const db = await loadDB();
            const req = db.requests.find(r => r.id === requestId);
            if (req) {
                req.status = 'completed';
                await saveDB(db);
                showToast('Мероприятие завершено, теперь волонтёры могут оставить отзывы');
            }
        }

        async function addReview(requestId, rating, text) {
            const db = await loadDB();
            db.reviews.push({
                id: Date.now() + '-' + Math.random(),
                requestId,
                userId: currentUser.id,
                rating,
                text,
                createdAt: new Date().toISOString()
            });
            await saveDB(db);
            showToast('Спасибо за отзыв!');
        }

        async function handleAvatarUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const img = new Image();
            const reader = new FileReader();
            reader.onload = (event) => {
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const size = 64;
                    canvas.width = size;
                    canvas.height = size;
                    ctx.drawImage(img, 0, 0, size, size);
                    const base64 = canvas.toDataURL('image/jpeg', 0.7);
                    document.getElementById('profileAvatar').src = base64;
                    currentUser.avatar = base64;
                };
            };
            reader.readAsDataURL(file);
        }

        async function renderChatWindow(requestId) {
            const db = await loadDB();
            const req = db.requests.find(r => r.id === requestId);
            if (!req) return;
            const otherUserId = (currentUser.id === req.userId) ? (req.booked && req.booked[0]?.userId) : req.userId;
            if (!otherUserId) { showToast('Нет собеседника'); return; }
            const messages = db.messages.filter(m => m.requestId === requestId && ((m.fromUserId === currentUser.id && m.toUserId === otherUserId) || (m.fromUserId === otherUserId && m.toUserId === currentUser.id)));
            messages.sort((a,b) => a.timestamp - b.timestamp);
            const container = document.getElementById('pageContent');
            container.innerHTML = `
                <div class="card">
                    <h2>Чат: ${req.title}</h2>
                    <div id="chatMessages" class="chat-container">
                        ${messages.map(m => `
                            <div class="chat-message ${m.fromUserId === currentUser.id ? 'sent' : 'received'}">
                                <strong>${m.fromUserId === currentUser.id ? 'Вы' : (db.users.find(u=>u.id===m.fromUserId)?.name || 'Пользователь')}:</strong> ${m.text}<br>
                                <small>${new Date(m.timestamp).toLocaleString()}</small>
                            </div>
                        `).join('')}
                    </div>
                    <div class="form-group">
                        <textarea id="newMessage" rows="2" class="form-control" placeholder="Введите сообщение..."></textarea>
                        <button id="sendMsgBtn" class="btn">Отправить</button>
                    </div>
                    <button id="backToChats" class="btn-outline btn">Назад к чатам</button>
                </div>
            `;
            const messagesDiv = document.getElementById('chatMessages');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            document.getElementById('sendMsgBtn').addEventListener('click', async () => {
                const text = document.getElementById('newMessage').value.trim();
                if (!text) return;
                const newMsg = {
                    id: Date.now() + '-' + Math.random(),
                    requestId,
                    fromUserId: currentUser.id,
                    toUserId: otherUserId,
                    text,
                    timestamp: Date.now()
                };
                const db = await loadDB();
                db.messages.push(newMsg);
                await saveDB(db);
                renderChatWindow(requestId);
            });
            document.getElementById('backToChats').addEventListener('click', () => renderChats());
        }

                if (db.users.some(u => u.username === username)) { showToast('Логин занят'); return; }
                const salt = generateSalt();
                const hash = await hashPassword(password, salt);
                const newUser = {
                    id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    username,
                    passwordSalt: salt,
                    passwordHash: hash,
                    name,
                    role,
                    approved: role === 'student',
                    email,
                    contact,
                    bio: '',
                    avatar: null
                };
                db.users.push(newUser);
                await saveDB(db);
                if (role === 'teacher') {
                    showToast('Регистрация успешна! После подтверждения администратором вы сможете войти.');
                } else {
                    showToast('Регистрация успешна! Войдите.');
                }
                navigate('login');
            });
        }

        // ========== АДМИНКА ==========
        async function renderAdmin() {
            if (!currentUser || currentUser.role !== 'admin') { showToast('Доступ запрещён'); return navigate('home'); }
            const db = await loadDB();
            const pendingTeachers = db.users.filter(u => u.role === 'teacher' && !u.approved);
            const container = document.getElementById('pageContent');
            container.innerHTML = `
                <div class="card">
                    <h2>⚙️ Админ-панель</h2>
                    <h3>Учителя, ожидающие подтверждения</h3>
                    ${pendingTeachers.length === 0 ? '<p>Нет ожидающих.</p>' : `
                        <div class="admin-list">
                            ${pendingTeachers.map(teacher => `
                                <div class="admin-item" data-id="${teacher.id}">
                                    <div><strong>${teacher.name}</strong> (${teacher.username})<br>Email: ${teacher.email || 'нет'}<br>Контакт: ${teacher.contact || 'нет'}<br>О себе: ${teacher.bio || 'нет'}</div>
                                    <div><button class="btn approveBtn" data-id="${teacher.id}">✅ Одобрить</button><button class="btn-outline btn rejectBtn" data-id="${teacher.id}">❌ Отклонить</button></div>
                                </div>
                            `).join('')}
                        </div>
                    `}
                </div>
            `;
            document.querySelectorAll('.approveBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    const db = await loadDB();
                    const teacher = db.users.find(u => u.id === id);
                    if (teacher) {
                        teacher.approved = true;
                        await saveDB(db);
                        showToast(`Учитель ${teacher.name} одобрен`);
                        if (teacher.email) {
                            await sendEmail({
                                to: teacher.email,
                                subject: 'Регистрация одобрена',
                                message: `Здравствуйте, ${teacher.name}! Ваша учётная запись учителя одобрена. Теперь вы можете создавать заявки на волонтёров.`
                            });
                        }
                        renderAdmin();
                    }
                });
            });
            document.querySelectorAll('.rejectBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    if (confirm('Удалить пользователя?')) {
                        const db = await loadDB();
                        db.users = db.users.filter(u => u.id !== id);
                        await saveDB(db);
                        showToast('Учитель отклонён');
                        renderAdmin();
                    }
                });
            });
        }

        // ========== О ПРОЕКТЕ ==========
        function renderAbout() {
            document.getElementById('pageContent').innerHTML = `
                <div class="card">
                    <h2>🌿 О проекте «Будь наставником!»</h2>
                    <p>Волонтёрская помощь учителям дополнительного образования в Сочи</p>
                    <hr>
                    <h3>📋 Задачи:</h3>
                    <ul><li>✅ Опрос учителей и учеников</li><li>✅ Созданы информационные листовки</li><li>✅ Проведено мотивационное событие</li><li>✅ Сообщество в Telegram</li><li>✅ Данный сайт с бронированием, чатом и отзывами, безопасное хранение данных</li><li>✅ Разработаны правила этикета</li><li>✅ Проведены пробные мероприятия</li></ul>
                    <p>🔐 Все данные хранятся в зашифрованном виде на сервере, ключи доступа недоступны в клиентском коде.</p>
                    <p>⭐ Присоединяйтесь к волонтёрскому движению Сочи!</p>
                </div>
            `;
        }

        // ========== НАВИГАЦИЯ ==========
        async function navigate(page) {
            document.querySelectorAll('.nav a, .nav button').forEach(el => el.classList.remove('active'));
            const activeEl = Array.from(document.querySelectorAll('.nav a, .nav button')).find(el => el.dataset.page === page);
            if (activeEl) activeEl.classList.add('active');
            if (page === 'home') await renderHome();
            else if (page === 'create') await renderCreate();
            else if (page === 'profile') await renderProfile();
            else if (page === 'login') await renderLogin();
            else if (page === 'admin') await renderAdmin();
            else if (page === 'chats') await renderChats();
            else if (page === 'about') renderAbout();
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        window.addEventListener('load', async () => {
            await ensureAdminExists();
            await loadCurrentUser();
            updateNav();
            const urlParams = new URLSearchParams(window.location.search);
            const requestId = urlParams.get('request');
            if (requestId) {
                const db = await loadDB();
                const req = db.requests.find(r => r.id === requestId);
                if (req) showRequestDetails(req);
                else navigate('home');
            } else {
                const initialPage = window.location.hash.replace('#', '') || 'home';
                navigate(initialPage);
            }
        });
    </script>
</body>
</html>
